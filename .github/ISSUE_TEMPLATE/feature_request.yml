name: 功能建议
description: 提议可验证的新能力或交互改进
title: "[Feature] "
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 描述用户场景和当前限制，而不只是给出实现方式。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: 影响范围
      multiple: true
      options:
        - 桌面端界面与交互
        - Windows 宿主能力
        - MySQL
        - PostgreSQL
        - 文档或开发流程
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案与补充信息
  - type: checkboxes
    id: checks
    attributes:
      label: 提交确认
      options:
        - label: 我已搜索现有 Issue，未发现相同建议
          required: true
        - label: 示例和截图不包含真实内部数据
          required: true
