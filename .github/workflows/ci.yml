name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install JavaScript dependencies
        working-directory: desktop
        run: npm ci

      - name: Run unit and project checks
        working-directory: desktop
        run: npm test

      - name: Check JavaScript syntax
        shell: pwsh
        run: |
          $files = Get-ChildItem desktop/src, extension -Recurse -File | Where-Object { $_.Extension -in '.js', '.mjs' }
          foreach ($file in $files) {
            node --check $file.FullName
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Check Rust formatting
        run: cargo fmt --manifest-path desktop/src-tauri/Cargo.toml -- --check

      - name: Check Rust
        run: cargo check --locked --manifest-path desktop/src-tauri/Cargo.toml
